name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0) — must already exist'
        required: true
        type: string
      run_id:
        description: 'CI workflow run ID to pull artifacts from (find in the Actions URL)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts from CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh run download "${{ inputs.run_id }}" --dir artifacts
          # Flatten nested artifact directories
          find artifacts -mindepth 2 -type f -exec mv {} artifacts/ \;
          find artifacts -mindepth 1 -type d -empty -delete
          echo "Release artifacts:"
          ls -la artifacts/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" artifacts/* \
            --generate-notes \
            --title "${{ inputs.tag }}"
